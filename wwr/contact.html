<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | Mendoza Rapids Adventures</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <header>
        <img src="images/logo.jpg" alt="Sample Logo">
        <h1>Mendoza Rapids Adventures</h1>
        <nav>
            <ul class="navigation">
                <li><a href="#">Home</a></li>
                <li><a href="#contact">Contact Us</a></li>
                <li><a href="#history">History</a></li>
                <li><a href="#trips">Trips</a></li>
            </ul>
        </nav>
    </header>

    <main>
     <div class="container">    
        <!-- Company Information -->
        <div class="section">
            <h2>Company Information</h2>
            <div class="contact-info">
          <p><strong>Direction:</strong><br>
          123 Adventure Ave,<br>
          Mendoza, Argentina</p>
          <p><strong>Phone:</strong><br>
          +54 123 456 789</p>
          <p><strong>Email:</strong><br>
          info@mendozaadventures.com</p>
          </div>
        </div>
     </div>
     
     <section>
     <!-- Google Map Embed -->
     <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3351.177458892576!2d-68.85313738480075!3d-32.89804542747013!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x969b4d00bd8f9b19%3A0x7c36b2ad750b4524!2sMendoza%20Rafting%20Adventures!5e0!3m2!1sen!2suk!4v1620031460572!5m2!1sen!2suk" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </section>

      <!-- Employee Profiles -->
      <section id="employee-profiles">
        <h2>Meet Our Team</h2>
        <div class="employee">
            <img src="images/empleado-1.avif" alt="Employee 1">
            <figcaption>Diego Martinez - River Guide</figcaption>
        </div>
        <div class="employee">
            <img src="images/empleado-3.jpg" alt="Employee 2">
            <figcaption>Sofia Ramirez - Co-founder</figcaption>
        </div>
        <div class="employee">
            <img src="images/empleado-2.avif" alt="Employee 3">
            <figcaption>Alejandro Fernandez - Customer Service</figcaption>
        </div>
    </section>
      

        <!-- Contact Form -->
        <section id="contact-form">
            <h2>Contact Us</h2>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>

                <label for="purpose">Purpose:</label><br>
                <input type="radio" id="inquiry" name="purpose" value="inquiry" checked>
                <label for="inquiry">General Inquiry</label><br>
                <input type="radio" id="reservation" name="purpose" value="reservation">
                <label for="reservation">Reservation Question</label><br>
                <input type="radio" id="suggestion" name="purpose" value="suggestion">
                <label for="suggestion">Website Suggestion</label><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="4" cols="50" required></textarea><br><br>

                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Please subscribe me to the monthly newsletter</label><br><br>

                <input type="submit" value="Submit">
            </form>
        </section>
    </main>

    <footer id="contact">
        <p>Follow Us </p>
        <nav class="sociallinks">

        </nav>
        <p>© 2024 Rafting Site ❤ Azul Nuarte </p>
    </footer>
</body>
</html>
